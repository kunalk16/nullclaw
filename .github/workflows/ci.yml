name: CI

env:
  ANDROID_API_LEVEL: 24
  ANDROID_NDK_VERSION: 29.0.14206865

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            zig_target: x86_64-linux-musl
          - os: macos-latest
            target: macos-aarch64
            zig_target: aarch64-macos
          - os: windows-latest
            target: windows-x86_64
            zig_target: x86_64-windows

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.15.2
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Set up JDK 17
        if: runner.os == 'Linux'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        if: runner.os == 'Linux'
        uses: android-actions/setup-android@v3
        with:
          packages: ''

      - name: Install Android NDK
        if: runner.os == 'Linux'
        run: sdkmanager --install "ndk;${ANDROID_NDK_VERSION}"

      - name: Export Android NDK paths
        if: runner.os == 'Linux'
        run: |
          NDK_ROOT="${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}"
          SYSROOT="${NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          echo "ANDROID_NDK_ROOT=${NDK_ROOT}" >> "$GITHUB_ENV"
          echo "ZIG_ANDROID_SYSROOT=${SYSROOT}" >> "$GITHUB_ENV"
          cat > "$RUNNER_TEMP/android-libc-aarch64.txt" <<EOF
          include_dir=${SYSROOT}/usr/include/aarch64-linux-android
          sys_include_dir=${SYSROOT}/usr/include
          crt_dir=${SYSROOT}/usr/lib/aarch64-linux-android/${ANDROID_API_LEVEL}
          msvc_lib_dir=
          kernel32_lib_dir=
          gcc_dir=
          EOF
          cat > "$RUNNER_TEMP/android-libc-armv7.txt" <<EOF
          include_dir=${SYSROOT}/usr/include/arm-linux-androideabi
          sys_include_dir=${SYSROOT}/usr/include
          crt_dir=${SYSROOT}/usr/lib/arm-linux-androideabi/${ANDROID_API_LEVEL}
          msvc_lib_dir=
          kernel32_lib_dir=
          gcc_dir=
          EOF
          cat > "$RUNNER_TEMP/android-libc-x86_64.txt" <<EOF
          include_dir=${SYSROOT}/usr/include/x86_64-linux-android
          sys_include_dir=${SYSROOT}/usr/include
          crt_dir=${SYSROOT}/usr/lib/x86_64-linux-android/${ANDROID_API_LEVEL}
          msvc_lib_dir=
          kernel32_lib_dir=
          gcc_dir=
          EOF
          echo "ZIG_ANDROID_LIBC_AARCH64=$RUNNER_TEMP/android-libc-aarch64.txt" >> "$GITHUB_ENV"
          echo "ZIG_ANDROID_LIBC_ARMV7=$RUNNER_TEMP/android-libc-armv7.txt" >> "$GITHUB_ENV"
          echo "ZIG_ANDROID_LIBC_X86_64=$RUNNER_TEMP/android-libc-x86_64.txt" >> "$GITHUB_ENV"

      - name: Cache .zig-cache
        uses: actions/cache@v4
        with:
          path: .zig-cache
          key: zig-${{ matrix.target }}-${{ hashFiles('src/**/*.zig', 'build.zig') }}
          restore-keys: zig-${{ matrix.target }}-

      - name: Run tests
        run: zig build test --summary all 2>&1 | tee test-output.txt

      - name: Build ReleaseSmall
        run: zig build -Dtarget=${{ matrix.zig_target }} -Doptimize=ReleaseSmall

      - name: Preserve host binary
        run: |
          mkdir -p ci-artifacts
          cp "zig-out/bin/nullclaw${{ runner.os == 'Windows' && '.exe' || '' }}" "ci-artifacts/nullclaw${{ runner.os == 'Windows' && '.exe' || '' }}"

      - name: Cross-compile linux-aarch64 (musl)
        if: runner.os == 'Linux'
        run: zig build -Dtarget=aarch64-linux-musl -Doptimize=ReleaseSmall

      - name: Cross-compile android-aarch64 (Termux)
        if: runner.os == 'Linux'
        run: zig build -Dtarget=aarch64-linux-android.${ANDROID_API_LEVEL} -Doptimize=ReleaseSmall --libc "${ZIG_ANDROID_LIBC_AARCH64}"

      - name: Cross-compile android-armv7 (Termux)
        if: runner.os == 'Linux'
        run: zig build -Dtarget=arm-linux-androideabi.${ANDROID_API_LEVEL} -Dcpu=baseline+v7a -Doptimize=ReleaseSmall --libc "${ZIG_ANDROID_LIBC_ARMV7}"

      - name: Cross-compile android-x86_64 (Termux)
        if: runner.os == 'Linux'
        run: zig build -Dtarget=x86_64-linux-android.${ANDROID_API_LEVEL} -Doptimize=ReleaseSmall --libc "${ZIG_ANDROID_LIBC_X86_64}"

      - name: Cross-compile linux-arm32 (glibc)
        if: runner.os == 'Linux'
        run: zig build -Dtarget=arm-linux-gnueabihf -Doptimize=ReleaseSmall

      - name: Cross-compile linux-arm32 (musl)
        if: runner.os == 'Linux'
        run: zig build -Dtarget=arm-linux-musleabihf -Doptimize=ReleaseSmall

      - name: Job summary
        if: always()
        run: |
          echo "## nullClaw CI — ${{ matrix.target }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY

          if [ -f test-output.txt ]; then
            TESTS=$(grep -o '[0-9]*/[0-9]* tests passed' test-output.txt | head -1 || true)
            RSS=$(grep 'run test' test-output.txt | grep -o 'MaxRSS:[^ ]*' | head -1 | cut -d: -f2 || true)
            echo "| Tests | ${TESTS:-—} |" >> $GITHUB_STEP_SUMMARY
            echo "| Test MaxRSS | ${RSS:-—} |" >> $GITHUB_STEP_SUMMARY
          fi

          BIN="ci-artifacts/nullclaw"
          if [ "${{ runner.os }}" = "Windows" ]; then
            BIN="ci-artifacts/nullclaw.exe"
          fi
          if [ -f "$BIN" ]; then
            SIZE=$(wc -c < "$BIN" | tr -d ' ')
            SIZE_HR=$(awk "BEGIN {printf \"%.1f MB\", $SIZE / 1048576}")
            echo "| Binary (ReleaseSmall) | ${SIZE_HR} (${SIZE} bytes) |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload binary
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nullclaw-${{ matrix.target }}
          path: ci-artifacts/nullclaw${{ runner.os == 'Windows' && '.exe' || '' }}
